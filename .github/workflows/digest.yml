name: Pain Signal Digest

on:
  schedule:
    - cron: "0 6 */2 * *"   # every 2 days at 06:00 UTC
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  run-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit updated CSV back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run digest scraper
        run: python digest/scraper.py --no-push
        # --no-push: skip the git push inside scraper.py (we handle it here)

      - name: Commit updated signals
        run: |
          git config user.name  "artha-bot"
          git config user.email "artha-bot@users.noreply.github.com"
          git add data/pain_signals.csv data/seen_ids.json
          git diff --cached --quiet || git commit -m "digest: auto-update pain_signals.csv [skip ci]"
          git push
