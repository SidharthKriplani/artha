<svg viewBox="0 0 1100 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" role="img">
  <title>ARTHA Signal Intelligence Pipeline</title>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#4b5563"/>
    </marker>
    <marker id="arr2" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#374151"/>
    </marker>
    <marker id="arr-back" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="500" fill="#0d1117" rx="14"/>
  <rect x="1" y="1" width="1098" height="498" fill="none" stroke="#1f2937" stroke-width="1" rx="13"/>

  <!-- Title -->
  <text x="550" y="34" text-anchor="middle" fill="#6b7280" font-size="10.5" font-weight="700" letter-spacing="3.5">ARTHA — SIGNAL INTELLIGENCE PIPELINE</text>

  <!-- ═══ TOP ROW BOXES ═══ -->

  <!-- Box 1: Community Input -->
  <rect x="24" y="52" width="182" height="148" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="24" y="52" width="182" height="4" rx="2" fill="#374151"/>
  <text x="115" y="80" text-anchor="middle" fill="#9ca3af" font-size="8.5" font-weight="700" letter-spacing="2.5">COMMUNITY INPUT</text>
  <text x="115" y="104" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="800">Pain Detection</text>
  <text x="115" y="126" text-anchor="middle" fill="#6b7280" font-size="9.5">r/LocalLLaMA · r/ML</text>
  <text x="115" y="142" text-anchor="middle" fill="#6b7280" font-size="9.5">r/devtools · r/SideProject</text>
  <text x="115" y="158" text-anchor="middle" fill="#6b7280" font-size="9.5">r/developersIndia · +2</text>
  <text x="115" y="181" text-anchor="middle" fill="#4b5563" font-size="9" font-style="italic">no API key required</text>

  <!-- Arrow 1→2 -->
  <line x1="207" y1="126" x2="236" y2="126" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 2: Signal Scoring -->
  <rect x="240" y="52" width="182" height="148" rx="10" fill="#052e16" stroke="#166534" stroke-width="1.5"/>
  <rect x="240" y="52" width="182" height="4" rx="2" fill="#166534"/>
  <text x="331" y="80" text-anchor="middle" fill="#4ade80" font-size="8.5" font-weight="700" letter-spacing="2.5">SIGNAL SCORING</text>
  <text x="331" y="104" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="800">Score 1 – 3</text>
  <text x="331" y="126" text-anchor="middle" fill="#86efac" font-size="9.5">Upvote weight</text>
  <text x="331" y="142" text-anchor="middle" fill="#86efac" font-size="9.5">Frustration language</text>
  <text x="331" y="158" text-anchor="middle" fill="#86efac" font-size="9.5">Keyword specificity</text>
  <text x="331" y="181" text-anchor="middle" fill="#166534" font-size="9" font-style="italic">auto-commits every 2 days</text>

  <!-- Arrow 2→3 -->
  <line x1="423" y1="126" x2="452" y2="126" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 3: Gap Verification -->
  <rect x="456" y="52" width="182" height="148" rx="10" fill="#1c1002" stroke="#d97706" stroke-width="1.5"/>
  <rect x="456" y="52" width="182" height="4" rx="2" fill="#d97706"/>
  <text x="547" y="80" text-anchor="middle" fill="#fbbf24" font-size="8.5" font-weight="700" letter-spacing="2.5">GAP VERIFICATION</text>
  <text x="547" y="104" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="800">The One Bar</text>
  <text x="547" y="126" text-anchor="middle" fill="#fcd34d" font-size="9.5">Does a zero-friction solution</text>
  <text x="547" y="142" text-anchor="middle" fill="#fcd34d" font-size="9.5">already exist? If yes →</text>
  <text x="547" y="158" text-anchor="middle" fill="#fcd34d" font-size="9.5">superseded. If no → build.</text>
  <text x="547" y="181" text-anchor="middle" fill="#78350f" font-size="9" font-style="italic">mandatory before claiming</text>

  <!-- Arrow 3→4 -->
  <line x1="639" y1="126" x2="668" y2="126" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 4: Ideas & Claiming -->
  <rect x="672" y="52" width="182" height="148" rx="10" fill="#0a0f2e" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="672" y="52" width="182" height="4" rx="2" fill="#3b82f6"/>
  <text x="763" y="80" text-anchor="middle" fill="#60a5fa" font-size="8.5" font-weight="700" letter-spacing="2.5">OPEN IDEA · CLAIM</text>
  <text x="763" y="104" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="800">Contributor Gate</text>
  <text x="763" y="126" text-anchor="middle" fill="#93c5fd" font-size="9.5">Scoped in IDEAS.md</text>
  <text x="763" y="142" text-anchor="middle" fill="#93c5fd" font-size="9.5">track.py --claim</text>
  <text x="763" y="158" text-anchor="middle" fill="#93c5fd" font-size="9.5">7-day expiry enforced</text>
  <text x="763" y="181" text-anchor="middle" fill="#1d4ed8" font-size="9" font-style="italic">gap verified before claim</text>

  <!-- Arrow 4→5 -->
  <line x1="855" y1="126" x2="884" y2="126" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 5: Deploy -->
  <rect x="888" y="52" width="188" height="148" rx="10" fill="#1a0a0a" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="888" y="52" width="188" height="4" rx="2" fill="#ef4444"/>
  <text x="982" y="80" text-anchor="middle" fill="#f87171" font-size="8.5" font-weight="700" letter-spacing="2.5">BUILD · DEPLOY</text>
  <text x="982" y="104" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="800">Ship &amp; Credit</text>
  <text x="982" y="126" text-anchor="middle" fill="#fca5a5" font-size="9.5">HuggingFace Spaces</text>
  <text x="982" y="142" text-anchor="middle" fill="#fca5a5" font-size="9.5">problem · prd · scope · code</text>
  <text x="982" y="158" text-anchor="middle" fill="#fca5a5" font-size="9.5">CONTRIBUTORS.md entry</text>
  <text x="982" y="181" text-anchor="middle" fill="#7f1d1d" font-size="9" font-style="italic">every contributor credited</text>

  <!-- ═══ DASHED CONNECTORS DOWN ═══ -->
  <line x1="331" y1="200" x2="331" y2="272" stroke="#166534" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="547" y1="200" x2="547" y2="272" stroke="#374151" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="763" y1="200" x2="763" y2="272" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="982" y1="200" x2="982" y2="272" stroke="#374151" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ═══ BOTTOM ROW ═══ -->

  <!-- Intelligence Layer -->
  <rect x="240" y="272" width="398" height="105" rx="10" fill="#030d07" stroke="#166534" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="439" y="298" text-anchor="middle" fill="#4ade80" font-size="8.5" font-weight="700" letter-spacing="2.5">INTELLIGENCE LAYER</text>
  <text x="439" y="320" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="800">Embeddings + Clustering</text>
  <text x="290" y="342" fill="#6b7280" font-size="9">· sentence-transformers (MiniLM-L6)</text>
  <text x="290" y="357" fill="#6b7280" font-size="9">· HDBSCAN + TF-IDF cluster labels</text>
  <text x="290" y="372" fill="#6b7280" font-size="9">· Workaround + tool rejection extraction</text>

  <!-- Arrow Intelligence → Signal Tracker -->
  <line x1="639" y1="324" x2="668" y2="324" stroke="#374151" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Signal Tracker -->
  <rect x="672" y="272" width="404" height="105" rx="10" fill="#050a1a" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="874" y="298" text-anchor="middle" fill="#60a5fa" font-size="8.5" font-weight="700" letter-spacing="2.5">SIGNAL TRACKER</text>
  <text x="874" y="320" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="800">Lifecycle + Evidence</text>
  <text x="706" y="342" fill="#6b7280" font-size="9">· Append-only CSV (signal_tracker.csv)</text>
  <text x="706" y="357" fill="#6b7280" font-size="9">· open → claimed → building → deployed</text>
  <text x="706" y="372" fill="#6b7280" font-size="9">· 7-day claim expiry, auto-freed on --list</text>

  <!-- Feedback loop arrow -->
  <path d="M982 377 Q982 420 550 420 Q120 420 115 200" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-back)"/>
  <text x="550" y="437" text-anchor="middle" fill="#6366f1" font-size="9" font-weight="600">credibility attracts contributors → better signals surface → loop compounds</text>

  <!-- ═══ STATS BAR ═══ -->
  <rect x="24" y="455" width="1052" height="34" rx="8" fill="#111827" stroke="#1f2937" stroke-width="1"/>

  <text x="120" y="468" text-anchor="middle" fill="#6b7280" font-size="7.5" font-weight="700" letter-spacing="1.5">SIGNALS</text>
  <text x="120" y="482" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="800">7 documented</text>
  <line x1="224" y1="460" x2="224" y2="484" stroke="#1f2937" stroke-width="1"/>

  <text x="318" y="468" text-anchor="middle" fill="#6b7280" font-size="7.5" font-weight="700" letter-spacing="1.5">SOLUTIONS</text>
  <text x="318" y="482" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="800">4 deployed</text>
  <line x1="440" y1="460" x2="440" y2="484" stroke="#1f2937" stroke-width="1"/>

  <text x="550" y="468" text-anchor="middle" fill="#6b7280" font-size="7.5" font-weight="700" letter-spacing="1.5">HF SPACES</text>
  <text x="550" y="482" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="800">3 live</text>
  <line x1="660" y1="460" x2="660" y2="484" stroke="#1f2937" stroke-width="1"/>

  <text x="762" y="468" text-anchor="middle" fill="#6b7280" font-size="7.5" font-weight="700" letter-spacing="1.5">POSTS ANALYZED</text>
  <text x="762" y="482" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="800">188 signals</text>
  <line x1="878" y1="460" x2="878" y2="484" stroke="#1f2937" stroke-width="1"/>

  <text x="988" y="468" text-anchor="middle" fill="#6b7280" font-size="7.5" font-weight="700" letter-spacing="1.5">DIGEST CADENCE</text>
  <text x="988" y="482" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="800">every 2 days</text>
</svg>
